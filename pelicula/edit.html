<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar película</title>
</head>

<body>
    <h1>Editar película</h1>
    <form id="movie-form">
        <input type="text" name="name" placeholder="Nombre" required>
        <input type="number" name="year" placeholder="Año" required>
        <input type="text" name="director" placeholder="Director">
        <textarea name="review" placeholder="Reseña"></textarea>
        <input type="text" name="actors" placeholder="Actores (separados por comas)">
        <input type="text" name="image" placeholder="URL de imagen (ej: https://...)">
        <button type="submit">Actualizar</button>
    </form>
    <form id="delete-form" style="margin-top: 20px;">
        <button type="submit" style="background-color: red; color: white;">Eliminar</button>
    </form>
    <p><a href="/movies">Volver a la lista</a></p>

    <script src="/js/edit.js"></script>
</body>

</html>

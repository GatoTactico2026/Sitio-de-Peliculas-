<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar película</title>
    <link rel="stylesheet" href="/css/site.css">
</head>

<body>
    <h1>Agregar película</h1>
    <form id="movie-form" action="/movies" method="POST">
        <input type="text" name="name" placeholder="Nombre" maxlength="100" required>
        <input type="number" name="year" placeholder="Año" required>
        <input type="text" name="director" placeholder="Director" maxlength="100">
        <textarea name="review" placeholder="Reseña (máx. 200 palabras)" maxlength="2000"></textarea>
        <input type="text" name="actors" placeholder="Actores (separados por comas)" maxlength="100">
        <input type="text" name="image" placeholder="URL de imagen" maxlength="100">
        <button type="submit">Guardar</button>
    </form>
    <p><a href="/movies">Volver a la lista</a></p>
</body>

</html>
